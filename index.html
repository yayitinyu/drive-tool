<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="将 Google Drive 分享链接或任意图片直链转换为 URL、Markdown、HTML 和 BBCode。">
  <meta name="color-scheme" content="light dark">
  <title>LinkCanvas · 图片直链格式转换</title>
  <link rel="icon" href="./logo.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --surface-hover: #f1f5f9;
      --text: #172033;
      --text-muted: #64748b;
      --border: #dfe5ee;
      --border-strong: #cbd5e1;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-soft: #eff6ff;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --success: #087f5b;
      --shadow: 0 24px 64px rgba(23, 32, 51, 0.09);
      --focus: 0 0 0 4px rgba(37, 99, 235, 0.15);
      --radius-lg: 24px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0c111d;
      --surface: #141b2a;
      --surface-soft: #101725;
      --surface-hover: #1b2435;
      --text: #eef2ff;
      --text-muted: #94a3b8;
      --border: #283348;
      --border-strong: #3a4760;
      --primary: #60a5fa;
      --primary-hover: #93c5fd;
      --primary-soft: #172b4d;
      --danger: #f87171;
      --danger-soft: #3a1d25;
      --success: #5ee0b7;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
      --focus: 0 0 0 4px rgba(96, 165, 250, 0.2);
    }

    * { box-sizing: border-box; }

    html { min-width: 320px; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 0%, rgba(37, 99, 235, 0.09), transparent 30rem),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background-color 180ms ease, color 180ms ease;
    }

    button,
    input { font: inherit; }

    button { -webkit-tap-highlight-color: transparent; }

    .app-shell {
      width: min(1040px, calc(100% - 40px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
    }

    .brand img {
      width: 42px;
      height: 42px;
      filter: drop-shadow(0 8px 12px rgba(37, 99, 235, 0.18));
    }

    .brand-name {
      display: block;
      font-size: 18px;
      font-weight: 750;
      letter-spacing: -0.02em;
    }

    .brand-tagline {
      display: block;
      margin-top: 2px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-button,
    .text-button,
    .copy-button,
    .history-action,
    .clear-button {
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: var(--surface);
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .icon-button {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 12px;
    }

    .icon-button:hover,
    .text-button:hover,
    .copy-button:hover,
    .history-action:hover {
      border-color: var(--border-strong);
      color: var(--text);
      background: var(--surface-hover);
    }

    button:focus-visible,
    input:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .workspace { padding: clamp(24px, 4vw, 42px); }

    .workspace-heading {
      max-width: 650px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 38px);
      line-height: 1.16;
      letter-spacing: -0.04em;
    }

    .workspace-heading p {
      margin: 11px 0 0;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .input-label {
      display: block;
      margin-bottom: 9px;
      font-size: 13px;
      font-weight: 700;
    }

    .input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
    }

    .url-input {
      width: 100%;
      min-width: 0;
      height: 50px;
      padding: 0 16px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      outline: none;
      color: var(--text);
      background: var(--surface-soft);
      caret-color: var(--primary);
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .url-input::placeholder { color: var(--text-muted); opacity: 0.72; }
    .url-input:hover { border-color: var(--primary); }
    .url-input:focus { border-color: var(--primary); background: var(--surface); box-shadow: var(--focus); }

    .text-button,
    .primary-button {
      height: 50px;
      padding: 0 18px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .text-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .primary-button {
      border: 1px solid var(--primary);
      color: #fff;
      background: #2563eb;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
      transition: background 150ms ease, transform 150ms ease, box-shadow 150ms ease;
    }

    .primary-button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.26);
    }

    .primary-button:active { transform: translateY(0); }

    .input-meta {
      min-height: 20px;
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .input-meta[data-status="success"] { color: var(--success); }
    .input-meta[data-status="error"] { color: var(--danger); }

    .results {
      display: grid;
      gap: 10px;
      margin-top: 30px;
      padding-top: 26px;
      border-top: 1px solid var(--border);
    }

    .results[hidden] { display: none; }

    .result-row {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      min-height: 56px;
      padding: 8px 8px 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-soft);
    }

    .result-label {
      font-size: 13px;
      font-weight: 750;
    }

    .result-value {
      overflow: hidden;
      color: var(--text-muted);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: all;
    }

    .copy-button {
      min-width: 68px;
      height: 38px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
    }

    .history-section {
      margin-top: 22px;
      padding: clamp(22px, 3vw, 30px);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 8px;
    }

    h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.01em;
    }

    .clear-button {
      padding: 7px 9px;
      border-color: transparent;
      border-radius: 8px;
      background: transparent;
      font-size: 12px;
    }

    .clear-button:hover { color: var(--danger); background: var(--danger-soft); }
    .clear-button:disabled { opacity: 0.45; cursor: not-allowed; }

    .history-list { display: grid; }

    .history-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 20px;
      padding: 15px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-item:last-child { border-bottom: 0; padding-bottom: 0; }

    .history-main { min-width: 0; }

    .history-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      margin-bottom: 5px;
    }

    .source-dot {
      flex: 0 0 auto;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-soft);
    }

    .history-host {
      overflow: hidden;
      font-size: 13px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-meta {
      overflow: hidden;
      color: var(--text-muted);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-actions { display: flex; gap: 7px; }

    .history-action {
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 650;
    }

    .history-action[data-action="delete"]:hover { color: var(--danger); background: var(--danger-soft); }

    .empty-history {
      padding: 24px 0 4px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
    }

    .toast {
      position: fixed;
      z-index: 10;
      right: 20px;
      bottom: 20px;
      max-width: min(360px, calc(100% - 40px));
      padding: 11px 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      background: var(--surface);
      box-shadow: var(--shadow);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .sun-icon { display: none; }
    :root[data-theme="dark"] .sun-icon { display: block; }
    :root[data-theme="dark"] .moon-icon { display: none; }

    @media (max-width: 720px) {
      .app-shell { width: min(100% - 24px, 1040px); padding-top: 18px; }
      .app-header { margin-bottom: 18px; }
      .brand-tagline { display: none; }
      .input-row { grid-template-columns: minmax(0, 1fr) auto; }
      .primary-button { grid-column: 1 / -1; }
      .result-row { grid-template-columns: minmax(0, 1fr) auto; gap: 6px 12px; }
      .result-label { grid-column: 1; }
      .result-value { grid-column: 1; grid-row: 2; }
      .copy-button { grid-column: 2; grid-row: 1 / 3; }
    }

    @media (max-width: 480px) {
      .app-shell { width: min(100% - 16px, 1040px); }
      .brand img { width: 38px; height: 38px; }
      .workspace { padding: 22px 18px; }
      .workspace-heading { margin-bottom: 22px; }
      .input-row { grid-template-columns: 1fr; }
      .text-button, .primary-button { width: 100%; justify-content: center; }
      .primary-button { grid-column: auto; }
      .history-section { padding: 20px 18px; }
      .history-item { align-items: end; gap: 10px; }
      .history-action { padding: 7px 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: 0.01ms !important; }
    }
  </style>
  <script>
    (() => {
      let savedTheme = null;
      try {
        savedTheme = localStorage.getItem('linkcanvas-theme');
      } catch {
        // 某些隐私模式会禁用 localStorage，主题仍可在当前页面中切换。
      }
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
  </script>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <a class="brand" href="./" aria-label="LinkCanvas 首页">
        <img src="./logo.svg" alt="" width="42" height="42">
        <span>
          <span class="brand-name">LinkCanvas</span>
          <span class="brand-tagline">轻量图片链接工具</span>
        </span>
      </a>
      <div class="header-actions">
        <button class="icon-button" id="themeToggle" type="button" aria-label="切换深色模式" title="切换主题">
          <svg class="moon-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20.2 15.6A8.5 8.5 0 0 1 8.4 3.8 8.5 8.5 0 1 0 20.2 15.6Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg class="sun-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="panel workspace" aria-labelledby="pageTitle">
      <div class="workspace-heading">
        <h1 id="pageTitle">图片直链格式转换</h1>
        <p>支持 Google Drive 分享链接和任意 HTTP(S) 图片直链，一次生成四种常用格式。</p>
      </div>

      <form id="converterForm" novalidate>
        <label class="input-label" for="sourceUrl">粘贴图片链接</label>
        <div class="input-row">
          <input class="url-input" id="sourceUrl" name="sourceUrl" type="url" inputmode="url" autocomplete="url" spellcheck="false" placeholder="https://drive.google.com/... 或 https://example.com/image.jpg" aria-describedby="inputMeta">
          <button class="text-button" id="pasteButton" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 5h6M9 3h6a1 1 0 0 1 1 1v2H8V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M16 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            一键粘贴
          </button>
          <button class="primary-button" type="submit">开始转换</button>
        </div>
        <div class="input-meta" id="inputMeta" role="status">链接仅在当前浏览器中处理，不会上传到服务器。</div>
      </form>

      <div class="results" id="results" aria-live="polite" hidden>
        <div class="result-row">
          <span class="result-label">URL</span>
          <output class="result-value" id="out-url"></output>
          <button class="copy-button" type="button" data-copy="url">复制</button>
        </div>
        <div class="result-row">
          <span class="result-label">Markdown</span>
          <output class="result-value" id="out-markdown"></output>
          <button class="copy-button" type="button" data-copy="markdown">复制</button>
        </div>
        <div class="result-row">
          <span class="result-label">HTML</span>
          <output class="result-value" id="out-html"></output>
          <button class="copy-button" type="button" data-copy="html">复制</button>
        </div>
        <div class="result-row">
          <span class="result-label">BBCode</span>
          <output class="result-value" id="out-bbcode"></output>
          <button class="copy-button" type="button" data-copy="bbcode">复制</button>
        </div>
      </div>
    </section>

    <section class="panel history-section" aria-labelledby="historyTitle">
      <div class="section-header">
        <h2 id="historyTitle">最近记录</h2>
        <button class="clear-button" id="clearHistory" type="button">清空记录</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'linkcanvas-history-v1';
      const MAX_HISTORY_ITEMS = 12;
      const elements = {
        form: document.getElementById('converterForm'),
        sourceUrl: document.getElementById('sourceUrl'),
        inputMeta: document.getElementById('inputMeta'),
        pasteButton: document.getElementById('pasteButton'),
        themeToggle: document.getElementById('themeToggle'),
        results: document.getElementById('results'),
        historyList: document.getElementById('historyList'),
        clearHistory: document.getElementById('clearHistory'),
        toast: document.getElementById('toast'),
      };

      let currentFormats = null;
      let toastTimer = null;

      function getDriveFileId(url) {
        if (!/(^|\.)drive\.google\.com$/i.test(url.hostname)) return null;

        const queryId = url.searchParams.get('id');
        if (queryId && /^[\w-]{10,}$/.test(queryId)) return queryId;

        const pathMatch = url.pathname.match(/\/(?:file\/d|d)\/([\w-]{10,})/i);
        return pathMatch?.[1] || null;
      }

      function parseSource(rawValue) {
        const value = rawValue.trim();
        if (!value) throw new Error('请先粘贴一个图片链接。');

        let url;
        try {
          url = new URL(value);
        } catch {
          throw new Error('链接格式不正确，请输入完整的 HTTP(S) 地址。');
        }

        if (!['http:', 'https:'].includes(url.protocol)) {
          throw new Error('仅支持 HTTP(S) 链接。');
        }

        const driveId = getDriveFileId(url);
        if (/(^|\.)drive\.google\.com$/i.test(url.hostname) && !driveId) {
          throw new Error('未找到 Google Drive 文件 ID，请检查分享链接。');
        }

        return {
          source: url.href,
          directUrl: driveId
            ? `https://drive.google.com/thumbnail?id=${encodeURIComponent(driveId)}&sz=w3000`
            : url.href,
          type: driveId ? 'Google Drive' : '图片直链',
          hostname: driveId ? 'drive.google.com' : url.hostname,
        };
      }

      function createFormats(directUrl) {
        const markdownUrl = directUrl.replace(/\(/g, '%28').replace(/\)/g, '%29');
        const htmlUrl = directUrl.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        return {
          url: directUrl,
          markdown: `![image](${markdownUrl})`,
          html: `<img src="${htmlUrl}" alt="image">`,
          bbcode: `[img]${directUrl}[/img]`,
        };
      }

      function setStatus(message, status = '') {
        elements.inputMeta.textContent = message;
        elements.inputMeta.dataset.status = status;
      }

      function showFormats(parsed) {
        currentFormats = createFormats(parsed.directUrl);
        Object.entries(currentFormats).forEach(([format, value]) => {
          document.getElementById(`out-${format}`).textContent = value;
        });
        elements.results.hidden = false;
        setStatus(`已识别为${parsed.type}，四种格式已生成。`, 'success');
      }

      function loadHistory() {
        try {
          const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
          if (!Array.isArray(data)) return [];
          return data.filter((item) => item && typeof item.source === 'string').slice(0, MAX_HISTORY_ITEMS);
        } catch {
          return [];
        }
      }

      function saveHistory(items) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        } catch {
          showToast('历史记录保存失败，浏览器存储可能不可用。');
        }
      }

      function addHistory(parsed) {
        const existing = loadHistory().filter((item) => item.source !== parsed.source);
        const item = {
          id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          source: parsed.source,
          directUrl: parsed.directUrl,
          type: parsed.type,
          hostname: parsed.hostname,
          createdAt: Date.now(),
        };
        saveHistory([item, ...existing].slice(0, MAX_HISTORY_ITEMS));
        renderHistory();
      }

      function formatTime(timestamp) {
        try {
          return new Intl.DateTimeFormat('zh-CN', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
          }).format(new Date(timestamp));
        } catch {
          return '';
        }
      }

      function createHistoryItem(item) {
        const row = document.createElement('article');
        row.className = 'history-item';
        row.dataset.id = item.id;

        const main = document.createElement('div');
        main.className = 'history-main';

        const title = document.createElement('div');
        title.className = 'history-title';
        const dot = document.createElement('span');
        dot.className = 'source-dot';
        dot.setAttribute('aria-hidden', 'true');
        const host = document.createElement('span');
        host.className = 'history-host';
        host.textContent = item.hostname || '未知来源';
        title.append(dot, host);

        const meta = document.createElement('div');
        meta.className = 'history-meta';
        meta.textContent = `${item.type || '图片直链'} · ${formatTime(item.createdAt)} · ${item.source}`;
        main.append(title, meta);

        const actions = document.createElement('div');
        actions.className = 'history-actions';
        actions.innerHTML = `
          <button class="history-action" type="button" data-action="restore">恢复</button>
          <button class="history-action" type="button" data-action="delete" aria-label="删除这条记录">删除</button>
        `;
        row.append(main, actions);
        return row;
      }

      function renderHistory() {
        const history = loadHistory();
        elements.historyList.replaceChildren();
        elements.clearHistory.disabled = history.length === 0;

        if (!history.length) {
          const empty = document.createElement('div');
          empty.className = 'empty-history';
          empty.textContent = '转换后的链接会保存在这里，仅当前浏览器可见。';
          elements.historyList.append(empty);
          return;
        }

        history.forEach((item) => elements.historyList.append(createHistoryItem(item)));
      }

      async function writeClipboard(text) {
        if (navigator.clipboard?.writeText && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }

        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
        document.body.append(textarea);
        textarea.select();
        const succeeded = document.execCommand('copy');
        textarea.remove();
        if (!succeeded) throw new Error('copy failed');
      }

      function showToast(message) {
        clearTimeout(toastTimer);
        elements.toast.textContent = message;
        elements.toast.classList.add('show');
        toastTimer = setTimeout(() => elements.toast.classList.remove('show'), 2200);
      }

      elements.form.addEventListener('submit', (event) => {
        event.preventDefault();
        try {
          const parsed = parseSource(elements.sourceUrl.value);
          showFormats(parsed);
          addHistory(parsed);
        } catch (error) {
          currentFormats = null;
          elements.results.hidden = true;
          setStatus(error.message, 'error');
          elements.sourceUrl.focus();
        }
      });

      elements.sourceUrl.addEventListener('input', () => {
        currentFormats = null;
        elements.results.hidden = true;
        setStatus('链接仅在当前浏览器中处理，不会上传到服务器。');
      });

      elements.pasteButton.addEventListener('click', async () => {
        try {
          if (!navigator.clipboard?.readText || !window.isSecureContext) {
            throw new Error('unavailable');
          }
          const text = await navigator.clipboard.readText();
          if (!text.trim()) {
            showToast('剪贴板中没有文本。');
            return;
          }
          elements.sourceUrl.value = text.trim();
          elements.form.requestSubmit();
        } catch {
          setStatus('浏览器未允许读取剪贴板，请手动粘贴或检查站点权限。', 'error');
          elements.sourceUrl.focus();
        }
      });

      elements.results.addEventListener('click', async (event) => {
        const button = event.target.closest('[data-copy]');
        if (!button || !currentFormats) return;
        try {
          await writeClipboard(currentFormats[button.dataset.copy]);
          showToast(`${button.dataset.copy === 'url' ? 'URL' : button.dataset.copy} 已复制。`);
        } catch {
          showToast('复制失败，请手动选择内容。');
        }
      });

      elements.historyList.addEventListener('click', (event) => {
        const button = event.target.closest('[data-action]');
        const row = event.target.closest('.history-item');
        if (!button || !row) return;

        const history = loadHistory();
        const item = history.find((entry) => entry.id === row.dataset.id);
        if (!item) return;

        if (button.dataset.action === 'delete') {
          saveHistory(history.filter((entry) => entry.id !== item.id));
          renderHistory();
          showToast('记录已删除。');
          return;
        }

        elements.sourceUrl.value = item.source;
        try {
          showFormats(parseSource(item.source));
          elements.sourceUrl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          showToast('已恢复这条记录。');
        } catch {
          showToast('这条历史记录已无法识别。');
        }
      });

      elements.clearHistory.addEventListener('click', () => {
        if (!loadHistory().length) return;
        saveHistory([]);
        renderHistory();
        showToast('历史记录已清空。');
      });

      elements.themeToggle.addEventListener('click', () => {
        const nextTheme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = nextTheme;
        try {
          localStorage.setItem('linkcanvas-theme', nextTheme);
        } catch {
          // 存储不可用时仅保留当前页面的主题状态。
        }
        elements.themeToggle.setAttribute('aria-label', nextTheme === 'dark' ? '切换浅色模式' : '切换深色模式');
      });

      renderHistory();
      elements.themeToggle.setAttribute(
        'aria-label',
        document.documentElement.dataset.theme === 'dark' ? '切换浅色模式' : '切换深色模式',
      );
    })();
  </script>
</body>
</html>
