  <rect x="4" y="4" width="56" height="56" rx="17" fill="url(#mark)"/>
  <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="16.25" fill="url(#shine)" stroke="#fff" stroke-opacity=".24" stroke-width="1.5"/>
  <path d="M16.5 42 25.8 32.5l7.2 7.2 5.4-5.4 9 8.7" fill="none" stroke="#F8FAFC" stroke-opacity=".9" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="43" cy="21" r="4.25" fill="#FDE68A"/>
  <circle cx="18.5" cy="17.5" r="2" fill="#F0ABFC" fill-opacity=".88"/>
  <path d="M25.5 23h-2a7 7 0 0 0 0 14h3M38.5 37h2a7 7 0 0 0 0-14h-3M27 30h10" fill="none" stroke="url(#link)" stroke-width="3.6" stroke-linecap="round"/>
