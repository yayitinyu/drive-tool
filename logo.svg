<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">LinkCanvas Logo</title>
  <desc id="desc">由极光色画框、链接和星点组成的几何标志</desc>
  <defs>
    <linearGradient id="mark" x1="8" y1="6" x2="57" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="link" x1="20" y1="24" x2="44" y2="39" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/>
      <stop offset=".48" stop-color="#F5D0FE"/>
      <stop offset="1" stop-color="#CFFAFE"/>
    </linearGradient>
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientTransform="translate(18 13) rotate(46) scale(44)">
      <stop stop-color="#F0ABFC" stop-opacity=".7"/>
